name: Build Augmented Steam
on:
  push:
    branches: ["*"]
  pull_request:
    types: [opened, edited]
jobs:
  build-all:
    name: Build Augmented Steam
    strategy:
      matrix:
        browser: [firefox, chrome, edge]
    uses: ./.github/workflows/run-build.yml
    with:
      browser: ${{ matrix.browser }}
